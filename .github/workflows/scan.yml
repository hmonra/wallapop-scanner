name: Wallapop Scanner

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          WALLAPOP_GIST_ID: ${{ secrets.WALLAPOP_GIST_ID }}
        run: python wallapop_scanner.py --once
