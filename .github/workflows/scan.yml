name: Wallapop Scanner

on:
  schedule:
    # 4 arranques al dia (cada 6h), sin solape. Cada arranque vive hasta el
    # timeout de 360 min (6h) y muere justo antes de que arranque el siguiente,
    # asi NO hay dos ejecuciones a la vez (evita duplicados y el contador del
    # latido se mantiene limpio y creciente). Si un run cae antes de tiempo,
    # el watchdog lo mata y el siguiente cron (6h despues) retoma.
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner (bucle continuo, cada 5 min)
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          WALLAPOP_GIST_ID: ${{ secrets.WALLAPOP_GIST_ID }}
          PYTHONUNBUFFERED: "1"
        run: python wallapop_scanner.py
