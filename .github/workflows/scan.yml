name: Wallapop Scanner

on:
  schedule:
    # 5 arranques al dia (cada 5h) para cubrir 24/7 SIN HUECOS. Cada arranque
    # corre el script en bucle hasta el timeout de 360 min (6h), asi que hay
    # ~1h de solape con el siguiente: si uno muere antes de tiempo, el otro
    # ya esta vivo y no se pierde ningun escaneo.
    - cron: "0 0 * * *"
    - cron: "0 5 * * *"
    - cron: "0 10 * * *"
    - cron: "0 15 * * *"
    - cron: "20 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner (bucle continuo, cada 5 min)
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          WALLAPOP_GIST_ID: ${{ secrets.WALLAPOP_GIST_ID }}
          PYTHONUNBUFFERED: "1"
        run: python wallapop_scanner.py
