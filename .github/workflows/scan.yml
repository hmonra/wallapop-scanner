name: Wallapop Scanner

on:
  schedule:
    # 4 arranques al dia (cada 6h) para cubrir 24/7. Cada arranque corre el
    # script en bucle escaneando cada 5 min hasta el timeout de 360 min.
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner (bucle continuo, cada 5 min)
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          WALLAPOP_GIST_ID: ${{ secrets.WALLAPOP_GIST_ID }}
        run: python wallapop_scanner.py
